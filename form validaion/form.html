<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Beautiful Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .form-container {
            background: #fff;
            padding: 40px;
            width: 350px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .form-container h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #555;
        }

        .input-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102,126,234,0.5);
        }

        .btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Register Here</h2>
    <form action="welcome.html" onsubmit="register(event)" >
        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="Enter your email"  >
        </div>

        <div class="input-group">
            <label>Contact Number</label>
            <input type="tel" id="cont" placeholder="Enter your contact number"  >
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="pass" placeholder="Enter password" >
        </div>

        <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" id="cpass" placeholder="Confirm password" >
        </div>

        <button type="submit"   class="btn">Submit</button>
    </form>
</div>


<script>
     function register(event){
         let email = document.getElementById("email").value;
         let contact = document.getElementById("cont").value;
         let pass = document.getElementById("pass").value;
         let cpas = document.getElementById("cpass").value;

         if(email == "" || contact == "" || pass == "" || cpas == ""){
             alert("All Field Are required");
             event.preventDefault();

         }
         else if(contact.length >10 || contact.length <10){
             alert("Contact number must be 10 digit");
             event.preventDefault();
         }
         else if(isNaN(contact)){
             alert("Contact must  be a number");
             event.preventDefault();
         }
         else if(pass != cpas){
            alert("Password and Confirm Password do not match");
            event.preventDefault();
         }
     }
</script>

</body>
</html>
